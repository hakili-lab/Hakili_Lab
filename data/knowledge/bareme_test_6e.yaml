meta:
  test_id: "hakili_6e_v1"
  titre: "Test d'évaluation niveau 6e — HAKILISSO"
  total_questions: 20
  total_possible: 20
  niveaux_evalues: ["CE1", "CE2", "CM1", "CM2"]
  note_rag: >
    ATTENTION : Ce test évalue exclusivement des compétences de l'école primaire
    (CE1 à CM2) qui ne sont pas référencées dans la base de connaissance
    curricula 6e–3e. Les chunk_ids sont vides ; le diagnostic se fait sans RAG,
    directement à partir des compétences décrites dans les champs
    competences_cibles et lacune_type.
  scoring: >
    Les points par sous-question sont indiqués entre parenthèses dans l'énoncé
    original. Le barème binaire Hakili remplace chaque sous-question par un 0/1.

