# ─── ACTIVITÉS NUMÉRIQUES ────────────────────────────────────────────────────

questions_numeriques:

  - id: Q_NUM_01a
    reponse: "N = ensemble des nombres entiers positifs ou nuls : {0, 1, 2, 3, …}"
    solution: >
      N (les entiers naturels) : C'est l'ensemble des nombres entiers positifs ou nuls.
      Exemples : 0, 1, 2, 3, 100, …

  - id: Q_NUM_01b
    reponse: "Z = ensemble des nombres entiers positifs, négatifs ou nuls : {…, −3, −2, −1, 0, 1, 2, 3, …}"
    solution: >
      Z (les entiers relatifs) : C'est l'ensemble des nombres entiers positifs, négatifs ou nuls.
      Exemples : …, −3, −2, −1, 0, 1, 2, 3, …

  - id: Q_NUM_01c
    reponse: "D = ensemble des nombres qui s'écrivent avec un nombre fini de chiffres après la virgule"
    solution: >
      D (les nombres décimaux) : C'est l'ensemble des nombres qui peuvent s'écrire avec
      un nombre fini de chiffres après la virgule.
      Exemples : 0,5 ; −3,14 ; 2,0 ; 1/4 = 0,25.

  - id: Q_NUM_02a
    reponse: "FAUX"
    solution: >
      D ⊂ N est FAUX car c'est N ⊂ D (tout entier naturel est un décimal, mais pas l'inverse).
      Par exemple 0,5 ∈ D mais 0,5 ∉ N.

  - id: Q_NUM_02b
    reponse: "VRAI"
    solution: >
      N ⊂ Z est VRAI : tout entier naturel est aussi un entier relatif (positif ou nul).

  - id: Q_NUM_02c
    reponse: "VRAI"
    solution: >
      8 ∈ D est VRAI car 8 = 8,0, ce qui a un nombre fini (un seul zéro) de chiffres après la virgule.

  - id: Q_NUM_03a
    reponse: "A = 54"
    solution: >
      A = (+42) + (+12) = 42 + 12 = 54.

  - id: Q_NUM_03b
    reponse: "B = −68,9"
    solution: >
      B = (−22,2) + (−46,7) = −(22,2 + 46,7) = −68,9.

  - id: Q_NUM_03c
    reponse: "C = −39"
    solution: >
      C = 27 + 3 × (35 − 57)
        = 27 + 3 × (−22)
        = 27 + (−66)
        = 27 − 66
        = −39.

  - id: Q_NUM_03d
    reponse: "D = −2135"
    solution: >
      D = −5 × [−3 − 5 × (12 − 4 × 25)] − (+3 + 27 − 80)
        = −5 × [−3 − 5 × (12 − 100)] − (30 − 80)
        = −5 × [−3 − 5 × (−88)] − (−50)
        = −5 × [−3 + 440] + 50
        = −5 × 437 + 50
        = −2185 + 50
        = −2135.

  - id: Q_NUM_04a
    reponse: "2,85 (par défaut)"
    solution: >
      X = 2,85418541…
      Par défaut (troncature au centième) : on supprime tous les chiffres après le centième
      → 2,85.

  - id: Q_NUM_04b
    reponse: "2,86 (par excès)"
    solution: >
      X = 2,85418541…
      Par excès (arrondi au centième supérieur) : le chiffre des millièmes est 4 ≥ 1,
      donc on ajoute 1 au centième → 2,86.

  - id: Q_NUM_05a
    reponse: "572 = 2² × 11 × 13"
    solution: >
      572 ÷ 2 = 286
      286 ÷ 2 = 143
      143 ÷ 11 = 13 (143 = 11 × 13)
      13 est premier.
      Donc 572 = 2² × 11 × 13.

  - id: Q_NUM_05b
    reponse: "127 est un nombre premier"
    solution: >
      On vérifie la divisibilité par les nombres premiers jusqu'à √127 ≈ 11,3 :
      127 ÷ 2 = non (impair) ; 127 ÷ 3 = non (1+2+7=10 non divisible par 3) ;
      127 ÷ 5 = non (ne finit pas par 0 ou 5) ; 127 ÷ 7 = 18,1… non ;
      127 ÷ 11 = 11,5… non.
      Donc 127 est un nombre premier.

  - id: Q_NUM_06a
    reponse: "x = 12"
    solution: >
      18 + x = 30
      x = 30 − 18
      x = 12.

  - id: Q_NUM_06b
    reponse: "x = 9"
    solution: >
      4x = 36
      x = 36 / 4
      x = 9.

  - id: Q_NUM_06c
    reponse: "x = 4 (avec x ≠ 0)"
    solution: >
      28/x = 7
      28 = 7x
      x = 28/7
      x = 4. (Condition d'existence : x ≠ 0, vérifiée.)

  - id: Q_NUM_07a
    reponse: "A = 41/4 (irréductible)"
    solution: >
      A = (7/4) × 3 + 5
        = 21/4 + 20/4
        = 41/4.
      PGCD(41, 4) = 1 → irréductible.

  - id: Q_NUM_07b
    reponse: "B = 15/7 (irréductible)"
    solution: >
      B = 2 × (3/7) + 9/7
        = 6/7 + 9/7
        = 15/7.
      PGCD(15, 7) = 1 → irréductible.

  - id: Q_NUM_07d
    reponse: "D = −89/12 (irréductible)"
    solution: >
      D = 5/(−3) − (−5)/4 − 7
        = −5/3 + 5/4 − 7
        = −20/12 + 15/12 − 84/12
        = (−20 + 15 − 84)/12
        = −89/12.
      PGCD(89, 12) = 1 → irréductible.

# ─── ACTIVITÉS GÉOMÉTRIQUES ──────────────────────────────────────────────────

questions_geometriques:

  - id: Q_GEO_01a
    reponse: "Points correctement placés sur la droite graduée : A(−7), B(−3), C(0), D(3,5), E(5)"
    solution: >
      Sur une droite graduée (D) :
      A à l'abscisse −7, B à −3, C à 0 (origine), D à 7/2 = 3,5, E à 5.
      Ordre croissant : A, B, C, D, E.

  - id: Q_GEO_01b
    reponse: "AB = 4 (unités)"
    solution: >
      AB = |xB − xA| = |−3 − (−7)| = |−3 + 7| = |4| = 4.

  - id: Q_GEO_02a
    reponse: "A(3 ; −4) correctement placé : 3 unités à droite de l'origine, 4 unités vers le bas"
    solution: >
      Depuis O(0;0) : aller 3 unités vers la droite (x = 3), puis 4 unités vers le bas (y = −4).

  - id: Q_GEO_02b
    reponse: "B(−1/2 ; −2) correctement placé : 0,5 unité à gauche, 2 unités vers le bas"
    solution: >
      Depuis O(0;0) : aller 1/2 unité vers la gauche (x = −0,5), puis 2 unités vers le bas (y = −2).

  - id: Q_GEO_02c
    reponse: "C(0 ; −4) correctement placé : sur l'axe des ordonnées, 4 unités vers le bas"
    solution: >
      x = 0 → point sur l'axe des ordonnées. y = −4 → 4 unités vers le bas de l'origine.

  - id: Q_GEO_03a
    reponse: "Deux angles formés par deux droites sécantes, de même sommet et de côtés en prolongement l'un de l'autre — ils sont toujours égaux"
    solution: >
      Deux angles opposés par le sommet sont deux angles formés par deux droites sécantes ;
      ils ont le même sommet et leurs côtés sont dans le prolongement l'un de l'autre.
      Propriété : ils sont toujours égaux.

  - id: Q_GEO_03b
    reponse: "Des mesures égales si les droites sur lesquelles ils reposent sont parallèles"
    solution: >
      Deux angles alternes-internes ont des mesures égales si et seulement si
      les droites coupées par la sécante sont parallèles.

  - id: Q_GEO_03c
    reponse: "180°"
    solution: >
      La somme des angles intérieurs d'un triangle est toujours égale à 180°.

  - id: Q_GEO_04a
    reponse: "B' tel que G soit le milieu du segment [BB'] — construire B' symétriquement à B par rapport à G"
    solution: >
      La symétrie centrale de centre G envoie B sur B' tel que G est le milieu de [BB'].
      Méthode : tracer le segment de B passant par G, puis reporter BG de l'autre côté de G
      pour obtenir B' avec BG = GB'.

  - id: Q_GEO_04b
    reponse: "E' tel que la droite (OC) soit la médiatrice de [EE'] — (OC) ⊥ [EE'] en son milieu"
    solution: >
      La symétrie axiale d'axe (OC) envoie E sur E' tel que (OC) est la médiatrice de [EE'].
      Méthode : abaisser la perpendiculaire de E sur (OC), noter le pied H, puis reporter
      EH de l'autre côté pour obtenir E' avec EH = HE'.

  - id: Q_GEO_05a
    reponse: "V = (Aire de la base × Hauteur) / 3"
    solution: >
      Volume d'une pyramide (ou d'un cône) :
      V = (Aire de la base × Hauteur) / 3.

  - id: Q_GEO_05b
    reponse: "V = π × r² × h"
    solution: >
      Volume d'un cylindre de rayon r et de hauteur h :
      V = π × r² × h.
