# ─── ACTIVITÉS NUMÉRIQUES ────────────────────────────────────────────────────

questions_numeriques:

  - id: Q_NUM_01
    reponse: "N : entiers naturels (0,1,2,…) | D : décimaux (fini de chiffres après virgule) | Z : entiers relatifs (…,-2,-1,0,1,2,…) | Q : rationnels (a/b, b≠0) | R : réels (rationnels + irrationnels)"
    solution: >
      N = {0, 1, 2, 3, ...} : nombres entiers naturels, servant à compter.
      D : nombres s'écrivant avec un nombre fini de chiffres après la virgule.
      Z = {..., -3, -2, -1, 0, 1, 2, 3, ...} : entiers naturels et leurs opposés.
      Q = {a/b | a ∈ Z, b ∈ Z, b ≠ 0} : tout nombre exprimable sous forme de fraction.
      R : tous les rationnels et irrationnels (√2, π, etc.).

  - id: Q_NUM_02
    reponse: "a) FAUX | b) VRAI | c) VRAI | d) FAUX | e) VRAI | f) VRAI"
    solution: >
      a) D ⊂ N : FAUX — 1,5 ∈ D mais 1,5 ∉ N.
      b) N ⊂ Z : VRAI — tout entier naturel est aussi un entier relatif.
      c) 8 ∈ D : VRAI — 8 = 8,0 est un nombre décimal.
      d) 2,765̄ ∉ Q : FAUX — 2,765̄ est une suite décimale illimitée périodique,
         donc c'est un rationnel (s'écrit comme fraction).
      e) 3,145689 ∈ R : VRAI — tout nombre réel appartient à R.
      f) Toute SDIP peut s'écrire sous forme de fraction : VRAI (définition du rationnel).

  - id: Q_NUM_03a
    reponse: "A = 54"
    solution: >
      A = (+42) + (+12) = 42 + 12 = 54.
      Addition de deux positifs : on additionne les valeurs absolues.

  - id: Q_NUM_03b
    reponse: "B = −68,9"
    solution: >
      B = (−22,2) + (−46,7) = −(22,2 + 46,7) = −68,9.
      Addition de deux négatifs : résultat négatif, on additionne les valeurs absolues.

  - id: Q_NUM_03c
    reponse: "C = −39"
    solution: >
      C = 27 + 3 × (35 − 57)
        = 27 + 3 × (−22)
        = 27 + (−66)
        = −39.
      Ordre de priorité : parenthèses → multiplication → addition.

  - id: Q_NUM_03d
    reponse: "D = −2135"
    solution: >
      D = −5 × [−3 − 5 × (12 − 4 × 25)] − (+3 + 27 − 80)
        = −5 × [−3 − 5 × (12 − 100)] − (30 − 80)
        = −5 × [−3 − 5 × (−88)] − (−50)
        = −5 × [−3 + 440] + 50
        = −5 × 437 + 50
        = −2185 + 50
        = −2135.

  - id: Q_NUM_04
    reponse: "Par défaut au 1/100 : 2,85 | Par excès au 1/100 : 2,86"
    solution: >
      X = 2,85418541...
      Chiffre des centièmes = 5. Chiffre suivant (millièmes) = 4.
      Par défaut (troncature au centième) : 2,85.
      Par excès : 2,85 + 0,01 = 2,86.
      Encadrement : 2,85 ≤ X ≤  2,86.

  - id: Q_NUM_05
    reponse: "572 = 2² × 11 × 13 | 127 est un nombre premier"
    solution: >
      572 : 572 ÷ 2 = 286 ; 286 ÷ 2 = 143 ; 143 ÷ 11 = 13 (13 est premier).
      Donc 572 = 2² × 11 × 13.
      127 : on teste les diviseurs jusqu'à √127 ≈ 11,2 :
      2 (non), 3 (1+2+7=10, non), 5 (non), 7 (7×18=126, reste 1 ; non), 11 (11×11=121, reste 6 ; non).
      Donc 127 est un nombre premier.

  - id: Q_NUM_06a
    reponse: "A = 2²¹"
    solution: >
      A = (2³)⁷ = 2^(3×7) = 2²¹.
      Règle : (aⁿ)ᵐ = aⁿˣᵐ.

  - id: Q_NUM_06b
    reponse: "B = 2⁸"
    solution: >
      B = (2)³ × (2)⁵ = 2^(3+5) = 2⁸.
      Règle : aⁿ × aᵐ = aⁿ⁺ᵐ.

  - id: Q_NUM_06c
    reponse: "C = 2⁻²"
    solution: >
      C = (2)³ ÷ (2)⁵ = 2^(3−5) = 2⁻².
      Règle : aⁿ ÷ aᵐ = aⁿ⁻ᵐ.

  - id: Q_NUM_07a
    reponse: "R⁺ ∪ R⁻ = R"
    solution: >
      R⁺ = {x ∈ R | x ≥ 0} et R⁻ = {x ∈ R | x ≤ 0}.
      Tout réel est soit positif, soit négatif, soit les deux (0) → R⁺ ∪ R⁻ = R.

  - id: Q_NUM_07b
    reponse: "R⁺ ∩ R⁻ = {0}"
    solution: >
      Seul 0 vérifie à la fois x ≥ 0 et x ≤ 0.
      Donc R⁺ ∩ R⁻ = {0}.

  - id: Q_NUM_08a
    reponse: "f(x) = x(3x − 2)"
    solution: >
      f(x) = 3x² − 2x = x × (3x − 2).
      Facteur commun : x.

  - id: Q_NUM_08b
    reponse: "g(x) = (6x − 7)²"
    solution: >
      g(x) = 36x² − 84x + 49 = (6x)² − 2×6x×7 + 7² = (6x − 7)².
      Identité (a − b)² avec a = 6x, b = 7.

  - id: Q_NUM_08c
    reponse: "h(x) = (3x − 4)(3x + 4)"
    solution: >
      h(x) = 9x² − 16 = (3x)² − 4² = (3x − 4)(3x + 4).
      Identité (a² − b²) = (a − b)(a + b) avec a = 3x, b = 4.

  - id: Q_NUM_08d
    reponse: "i(x) = (5x + 3)²"
    solution: >
      i(x) = 25x² + 30x + 9 = (5x)² + 2×5x×3 + 3² = (5x + 3)².
      Identité (a + b)² avec a = 5x, b = 3.

  - id: Q_NUM_09a
    reponse: "j(x) = x³ − 3x² − 3x − 4"
    solution: >
      j(x) = (x² + x + 1)(x − 4)
           = x³ − 4x² + x² − 4x + x − 4
           = x³ + (−4+1)x² + (−4+1)x − 4
           = x³ − 3x² − 3x − 4.

  - id: Q_NUM_09b
    reponse: "g(x) = 4x² − 12x + 9"
    solution: >
      g(x) = (3 − 2x)² = 3² − 2×3×2x + (2x)²
           = 9 − 12x + 4x²
           = 4x² − 12x + 9.
      Identité (a − b)² avec a = 3, b = 2x.

  - id: Q_NUM_10a
    reponse: "x = 12"
    solution: >
      18 + x = 30 → x = 30 − 18 = 12.

  - id: Q_NUM_10b
    reponse: "x = 9"
    solution: >
      4x = 36 → x = 36 ÷ 4 = 9.

  - id: Q_NUM_10c
    reponse: "x = 4"
    solution: >
      28/x = 7 → 28 = 7x → x = 28 ÷ 7 = 4.

  - id: Q_NUM_11
    reponse: "x ≤ −1 ; ensemble solution ]−∞ ; −1] ; droite graduée : crochet fermé en −1, flèche vers la gauche"
    solution: >
      −3x − 2 ≥ 1
      → −3x ≥ 1 + 2
      → −3x ≥ 3
      → x ≤ −1   (division par −3 : inversion du sens de l'inégalité).
      Ensemble solution : ]−∞ ; −1].
      Représentation : crochet fermé en −1, demi-droite colorée vers la gauche.

  - id: Q_NUM_12
    reponse: "Karim : 1 750 F | Moussa : 3 250 F"
    solution: >
      Soit K la part de Karim. Moussa reçoit K + 1 500.
      K + (K + 1 500) = 5 000
      2K = 3 500
      K = 1 750 F.
      Moussa : 1 750 + 1 500 = 3 250 F.
      Vérification : 1 750 + 3 250 = 5 000 F ✓.

  - id: Q_NUM_13a
    reponse: "A = 41/4"
    solution: >
      A = (7/4) × 3 + 5 = 21/4 + 20/4 = 41/4.

  - id: Q_NUM_13b
    reponse: "B = 15/7"
    solution: >
      B = (2 × 3/7) + 9/7 = 6/7 + 9/7 = 15/7.

  - id: Q_NUM_13c
    reponse: "C = −15/14"
    solution: >
      C = −3 ÷ (−2 / (5/(−7)))
        = −3 ÷ (−2 × (−7/5))
        = −3 ÷ (14/5)
        = −3 × (5/14)
        = −15/14.

  - id: Q_NUM_13d
    reponse: "D = −89/12"
    solution: >
      D = 5/(−3) − (−5/4) − 7
        = −5/3 + 5/4 − 7.
      Dénominateur commun = 12 :
        = −20/12 + 15/12 − 84/12
        = (−20 + 15 − 84) / 12
        = −89/12.

  - id: Q_NUM_14a
    reponse: "Population : les élèves d'une classe de 4e"
    solution: >
      La population étudiée est l'ensemble des individus concernés :
      ici, les élèves d'une classe de 4e.

  - id: Q_NUM_14b
    reponse: "Caractère : la note obtenue au devoir de mathématiques"
    solution: >
      Le caractère est la propriété mesurée sur chaque individu :
      ici, la note au devoir de mathématiques (caractère quantitatif discret).

  - id: Q_NUM_14c
    reponse: "Effectif total : 85 élèves"
    solution: >
      N = 4 + 18 + 32 + 20 + 6 + 5 = 85 élèves.

  - id: Q_NUM_14d
    reponse: "Moyenne x̄ ≈ 10,48"
    solution: >
      x̄ = (8×4 + 9×18 + 10×32 + 11×20 + 12×6 + 17×5) / 85
         = (32 + 162 + 320 + 220 + 72 + 85) / 85
         = 891 / 85
         ≈ 10,48.

  - id: Q_NUM_14e
    reponse: "Fréquence de la note 10 : 32/85 ≈ 0,376 soit 37,6%"
    solution: >
      f₁₀ = n₁₀ / N = 32 / 85 ≈ 0,376 soit 37,6%.

  - id: Q_NUM_14f
    reponse: "Diagramme en bâtons : notes 8(4), 9(18), 10(32), 11(20), 12(6), 17(5) — notes 13 à 16 absentes (effectif nul)"
    solution: >
      Axes : abscisse = notes de 8 à 17 (1 cm pour 1 note) ;
              ordonnée = effectifs (1 cm pour 5 élèves).
      Bâtons verticaux aux valeurs (note → hauteur) :
        8 → 4 ; 9 → 18 ; 10 → 32 ; 11 → 20 ; 12 → 6 ; 17 → 5.
      Notes 13, 14, 15, 16 → effectif nul (pas de bâton).

# ─── ACTIVITÉS GÉOMÉTRIQUES ──────────────────────────────────────────────────

questions_geometriques:

  - id: Q_GEO_01a
    reponse: "A(−7), B(−3), C(0), D(3,5), E(5) placés sur la droite graduée (unité = 1 cm)"
    solution: >
      Sur la droite graduée (unité = 1 cm), de gauche à droite :
      A à −7 (7 cm à gauche de O) ;
      B à −3 (3 cm à gauche de O) ;
      C à 0 (à l'origine) ;
      D à 3,5 (7/2 = 3,5 cm à droite de O) ;
      E à 5 (5 cm à droite de O).

  - id: Q_GEO_01b
    reponse: "AB = 4 cm"
    solution: >
      AB = |xB − xA| = |−3 − (−7)| = |−3 + 7| = |4| = 4 cm.

  - id: Q_GEO_02
    reponse: "A(3;−4), B(−1/2;−2), C(0;−4) placés dans le repère orthonormé (O,I,J)"
    solution: >
      Dans le repère (O,I,J), unité = 1 cm :
      A(3 ; −4) : 3 cm vers la droite, 4 cm vers le bas.
      B(−1/2 ; −2) = B(−0,5 ; −2) : 0,5 cm vers la gauche, 2 cm vers le bas.
      C(0 ; −4) : sur l'axe des ordonnées, 4 cm sous l'origine.

  - id: Q_GEO_03a
    reponse: "ils sont égaux"
    solution: >
      Définition : deux angles sont opposés par le sommet si leurs côtés sont
      les prolongements l'un de l'autre (sommet commun, pas de côté commun).
      Propriété : deux angles opposés par le sommet sont égaux.

  - id: Q_GEO_03b
    reponse: "mêmes mesures"
    solution: >
      Définition : formés par deux droites (D1) et (D2) coupées par une sécante (S) ;
      situés entre les deux droites, de part et d'autre de (S).
      Propriété : si (D1) ∥ (D2), alors les angles alternes-internes sont égaux.

  - id: Q_GEO_03c
    reponse: "La somme des angles d'un triangle est égale à 180°"
    solution: >
      Dans tout triangle ABC : Â + B̂ + Ĉ = 180°.

  - id: Q_GEO_04
    reponse: "ABCD est un parallélogramme"
    solution: >
      AB = DC signifie que AB et DC ont même direction, même sens et même norme.
      Par définition vectorielle, ABCD est un parallélogramme
      (les côtés [AB] et [DC] sont parallèles, de même longueur et de même sens).

  - id: Q_GEO_05a
    reponse: "AB + BC = AC"
    solution: >
      Relation de Chasles : AB+ BC = AC.

  - id: Q_GEO_05b
    reponse: "AB + AD = AC"
    solution: >
      Dans le parallélogramme ABCD : AD = BC (côtés opposés égaux et parallèles).
      Donc AB + AD = AB + BC = AC (relation de Chasles).

  - id: Q_GEO_06a
    reponse: "2 × EF = AC"
    solution: >
      Lecture sur le quadrillage : AC est deux fois EF en longueur, même direction et même sens.
      Donc 2 × EF = AC.

  - id: Q_GEO_06b
    reponse: "−3 × GH = LI"
    solution: >
      Lecture sur le quadrillage : LI est trois fois GH en longueur, sens opposé.
      Donc −3 × GH = LI.

  - id: Q_GEO_06c
    reponse: "NP = 2 × MN"
    solution: >
      Lecture sur le quadrillage : NP est deux fois MN en longueur, même direction et même sens.
      Donc NP = 2 × MN.

  - id: Q_GEO_06d
    reponse: "MP = −3 × CB"
    solution: >
      Lecture sur le quadrillage : MP est trois fois CB en longueur, sens opposé.
      Donc MP = −3 × CB.

  - id: Q_GEO_07a
    reponse: " voir figure : A' est le projeté de A sur (D) parallèlement à (L)"
    solution: >
      Construction :
      1. Tracer par A la droite parallèle à (L).
      2. A' est le point d'intersection de cette droite avec (D).

  - id: Q_GEO_07b
    reponse: " voir figure : B' est le projeté orthogonal de B sur (D)"
    solution: >
      Construction :
      1. Tracer par B la droite perpendiculaire à (D).
      2. B' est l'intersection de cette perpendiculaire avec (D).

  - id: Q_GEO_08a
    reponse: "Symétrique de B par rapport à G est L"
    solution: >
      Symétrie centrale de centre G :
      G est le milieu de [B, sym(B)].
      D'après la figure, le symétrique de B par rapport à G est le point L.

  - id: Q_GEO_08b
    reponse: "Symétrique de E par rapport à (OC) est G"
    solution: >
      Symétrie axiale d'axe (OC) :
      Le symétrique de E est le point situé de l'autre côté de (OC),
      à la même distance perpendiculaire.
      D'après la figure, le symétrique de E par rapport à (OC) est G.

  - id: Q_GEO_08c
    reponse: "I est le projeté de L sur (AM) parallèlement à (DP)"
    solution: >
      Projection parallèle : tracer par L la droite parallèle à (DP).
      L'intersection de cette droite avec (AM) est le point I.

  - id: Q_GEO_09a
    reponse: "V_pyramide = (1/3) × Aire_base × h"
    solution: >
      Volume d'une pyramide (ou cône) :
      V = (1/3) × B × h
      où B = aire de la base et h = hauteur.

  - id: Q_GEO_09b
    reponse: "V_cylindre = π × R² × h"
    solution: >
      Volume d'un cylindre de révolution :
      V = π × R² × h
      où R = rayon de la base circulaire et h = hauteur.
