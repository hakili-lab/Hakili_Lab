- id: 5e_NUM_Ch4_L3
  classe: 5e
  domaine: numerique
  chapitre: "Addition et soustraction dans ⅅ"
  lecon: "Multiplication et division dans ⅅ — règles des signes"
  savoir: "Règle des signes : (−)×(−) = (+), (+)×(−) = (−), (+)×(+) = (+)"
  savoir_faire:
    - Appliquer les règles des signes pour la multiplication de relatifs
    - Appliquer les règles des signes pour la division de relatifs
    - Calculer le produit ou le quotient de plusieurs nombres relatifs
  prerequis_ids: [6e_NUM_Ch6_L1, 6e_NUM_Ch2_L2, 6e_NUM_Ch2_L3]
  mots_cles: [multiplication, division, relatifs, règles des signes, produit, quotient]
  erreurs_frequentes:
    - Appliquer "moins par moins = plus" à l'addition au lieu de la multiplication
    - Confondre le signe de l'opération et le signe du nombre

- id: 5e_NUM_Ch4_L4
  classe: 5e
  domaine: numerique
  chapitre: "Addition et soustraction dans ⅅ"
  lecon: "Distributivité dans ⅅ — développement et factorisation"
  savoir: "La distributivité s'applique dans ⅅ avec les nombres relatifs : k(a+b) = ka + kb"
  savoir_faire:
    - Développer et réduire une expression du type k(a+b) avec k, a, b dans ⅅ
    - Factoriser une expression en mettant en évidence un facteur commun relatif
    - Appliquer la distributivité double : (a+b)(c+d) = ac+ad+bc+bd
  prerequis_ids: [6e_NUM_Ch2_L6, 5e_NUM_Ch4_L3]
  mots_cles: [distributivité, développer, factoriser, facteur commun, relatifs, k(a+b)]
  erreurs_frequentes:
    - Oublier de distribuer le signe négatif sur tous les termes
    - Écrire k(a+b) = ka + b (oubli du facteur sur le second terme)

- id: 5e_NUM_Ch5_L1
  classe: 5e
  domaine: numerique
  chapitre: "Expressions algébriques — lettre et calcul littéral"
  lecon: "Introduction du calcul littéral — monômes"
  savoir: "Comprendre qu'une lettre représente un nombre ; définir un monôme (coefficient × variable^exposant)"
  savoir_faire:
    - Calculer la valeur numérique d'une expression littérale pour une valeur donnée de la variable
    - Identifier le coefficient et le degré d'un monôme
    - Additionner et soustraire des monômes de même degré (termes semblables)
    - Multiplier deux monômes
  prerequis_ids: [5e_NUM_Ch4_L4]
  mots_cles: [calcul littéral, monôme, lettre, variable, coefficient, degré, termes semblables]
  erreurs_frequentes:
    - Additionner des termes non semblables : 3x + 2x² = 5x³ (faux)
    - Oublier la valeur absolue du coefficient en substituant une valeur négative

- id: 5e_NUM_Ch5_L2
  classe: 5e
  domaine: numerique
  chapitre: "Expressions algébriques"
  lecon: "Polynômes — définition, degré, termes"
  savoir: "Un polynôme est une somme de monômes ; son degré est le degré du terme de plus haut degré"
  savoir_faire:
    - Identifier le degré et les termes d'un polynôme
    - Réduire un polynôme (regrouper les termes semblables)
    - Ordonner un polynôme selon les puissances décroissantes
    - Additionner et soustraire deux polynômes
  prerequis_ids: [5e_NUM_Ch5_L1]
  mots_cles: [polynôme, degré, termes semblables, réduire, ordonner, puissances décroissantes]
  erreurs_frequentes:
    - Confondre degré du polynôme et nombre de termes
    - Additionner des termes de degrés différents

- id: 5e_NUM_Ch5_L3
  classe: 5e
  domaine: numerique
  chapitre: "Expressions algébriques"
  lecon: "Développement et réduction d'expressions — double distributivité"
  savoir: "Maîtriser le développement : (a+b)(c+d) = ac + ad + bc + bd"
  savoir_faire:
    - Développer et réduire un produit de deux binômes (a+b)(c+d)
    - Développer et réduire k×(ax + b) + l×(cx + d)
    - Vérifier un développement par substitution numérique
  prerequis_ids: [5e_NUM_Ch5_L2, 5e_NUM_Ch4_L4]
