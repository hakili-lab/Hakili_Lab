    - Résoudre une équation du type ax + b = c
    - Résoudre une équation du type ax + b = cx + d (transposer les termes)
    - Résoudre une équation avec parenthèses (développer d'abord)
    - Vérifier la solution dans l'équation de départ
  prerequis_ids: [5e_NUM_Ch6_L1, 5e_NUM_Ch5_L3]
  mots_cles: [équation, résolution, transposition, principes d'équivalence, ax+b=c, vérification]
  erreurs_frequentes:
