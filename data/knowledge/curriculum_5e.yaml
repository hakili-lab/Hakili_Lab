  erreurs_frequentes:
    - Oublier les termes croisés dans (a+b)(c+d)
    - Mal gérer les signes lors du développement avec des termes négatifs

- id: 5e_NUM_Ch5_L4
  classe: 5e
  domaine: numerique
  chapitre: "Expressions algébriques"
  lecon: "Factorisation — facteur commun"
  savoir: "Factoriser c'est écrire une somme comme un produit ; la technique de base est la mise en évidence du facteur commun"
  savoir_faire:
    - Identifier le facteur commun d'une expression (numériques et/ou littéraux)
    - Factoriser une expression en mettant le facteur commun en évidence
    - Vérifier une factorisation en développant
  prerequis_ids: [5e_NUM_Ch5_L3]
  mots_cles: [factorisation, facteur commun, mise en évidence, produit, vérification]
  erreurs_frequentes:
    - Oublier de diviser tous les termes par le facteur commun mis en évidence
    - Prendre un facteur partiel (ex : mettre 2 en évidence au lieu de 4 pour 4x + 8y)

- id: 5e_NUM_Ch6_L1
  classe: 5e
  domaine: numerique
  chapitre: "Équations du premier degré à une inconnue"
  lecon: "Notion d'équation — solution, ensemble solution"
  savoir: "Définir une équation du premier degré ax + b = 0 et ce qu'est une solution"
  savoir_faire:
    - Vérifier si une valeur est solution d'une équation par substitution
    - Identifier l'ensemble solution d'une équation dans ℝ, ℤ ou ℕ
    - Distinguer équation (=) et inéquation (< > ≤ ≥)
  prerequis_ids: [6e_NUM_Ch5_L1, 5e_NUM_Ch5_L1]
  mots_cles: [équation, inconnue, solution, ensemble solution, substitution, vérification]
  erreurs_frequentes:
    - Confondre solution de l'équation et valeur de l'inconnue dans un contexte
