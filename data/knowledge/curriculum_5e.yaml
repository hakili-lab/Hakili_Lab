- id: 5e_NUM_Ch6_L2
  classe: 5e
  domaine: numerique
  chapitre: "Équations du premier degré à une inconnue"
  lecon: "Résolution d'équations du 1er degré — méthode algébrique"
  savoir: "Principes d'équivalence : on peut ajouter un même nombre des deux côtés, ou multiplier/diviser par un même nombre non nul"
