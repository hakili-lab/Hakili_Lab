- id: 6e_NUM_Ch3_L3
  classe: 6e
  domaine: numerique
  chapitre: "Comparaison et rangement de nombres"
  lecon: "Ordre de grandeur d'un résultat"
  savoir: "Comprendre l'utilité de l'ordre de grandeur pour contrôler un calcul"
  savoir_faire:
    - Estimer l'ordre de grandeur d'un produit ou d'une somme avant le calcul
