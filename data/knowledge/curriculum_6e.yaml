# ============================================================================
# PROGRAMME DE MATHÉMATIQUES — CLASSE DE 6ème
# Source : Ministère de l'Éducation Nationale du Burkina Faso, Juillet 2022
# Référentiel : Approche Par Compétences (APC) — Post-primaire
#
# Structure de chaque entrée :
#   id            : identifiant unique (classe_domaine_ChX_LY)
#   classe        : niveau scolaire
#   domaine       : numerique | geometrique
#   chapitre      : intitulé officiel du chapitre
#   lecon         : intitulé officiel de la leçon
#   savoir        : connaissance théorique à retenir (taxonomie Bloom niv.1-2)
#   savoir_faire  : compétences opératoires testables (niv.3-4) — grain atomique
#   prerequis_ids : identifiants des leçons dont cette leçon dépend directement
#   mots_cles     : termes déclencheurs pour le moteur de récupération RAG
#   erreurs_frequentes : pièges pédagogiques identifiés chez les élèves burkinabè
# ============================================================================

# ─── ACTIVITÉS NUMÉRIQUES ────────────────────────────────────────────────────

- id: 6e_NUM_Ch1_L1
  classe: 6e
  domaine: numerique
  chapitre: "Numération décimale"
  lecon: "Chiffres, nombres entiers et décimaux — lecture et écriture"
  savoir: "Distinguer chiffre et nombre ; connaître la valeur positionnelle des chiffres dans un nombre décimal"
  savoir_faire:
    - Lire et écrire un nombre entier ou décimal en chiffres et en lettres
    - Identifier la valeur d'un chiffre selon sa position (unités, dixièmes, centièmes…)
    - Distinguer la partie entière et la partie décimale d'un nombre
    - Différencier les ensembles ℕ et ℝ⁺ et situer un nombre dans l'un ou l'autre
  prerequis_ids: []   # Acquis du CM — consolidation
  mots_cles: [nombre, chiffre, décimal, entier, position, virgule, lecture, écriture, ℕ, unité, dizaine, centaine]
  erreurs_frequentes:
    - Confondre chiffre et nombre (dire que 347 est un chiffre)
    - Inverser partie entière et partie décimale lors de la lecture
    - Croire que 3,10 et 3,1 sont différents

- id: 6e_NUM_Ch1_L2
  classe: 6e
  domaine: numerique
  chapitre: "Numération décimale"
  lecon: "Comparaison de deux nombres décimaux"
  savoir: "Connaître les symboles < > = et les règles de comparaison des décimaux"
  savoir_faire:
    - Comparer deux nombres décimaux positifs en utilisant les symboles < > =
    - Ranger plusieurs nombres par ordre croissant ou décroissant
    - Intercaler un décimal entre deux autres
  prerequis_ids: [6e_NUM_Ch1_L1]
  mots_cles: [comparaison, inférieur, supérieur, ordre, croissant, décroissant, rangement]
  erreurs_frequentes:
    - Comparer en longueur de chiffres (croire que 1,35 > 1,9 car "35 > 9")
    - Confondre ordre croissant et décroissant

- id: 6e_NUM_Ch2_L1
  classe: 6e
  domaine: numerique
  chapitre: "Opérations sur les entiers et décimaux positifs"
  lecon: "Addition et soustraction des entiers et décimaux positifs"
  savoir: "Maîtriser les techniques opératoires de l'addition et de la soustraction posées"
  savoir_faire:
    - Poser et effectuer une addition de décimaux positifs (alignement de la virgule)
    - Poser et effectuer une soustraction de décimaux positifs
    - Vérifier un résultat par la preuve (addition ↔ soustraction)
  prerequis_ids: [6e_NUM_Ch1_L1]
  mots_cles: [addition, soustraction, décimaux, virgule, retenue, emprunt, calcul posé]
  erreurs_frequentes:
    - Ne pas aligner les virgules lors de la pose
    - Oublier les retenues ou les emprunts

- id: 6e_NUM_Ch2_L2
  classe: 6e
  domaine: numerique
  chapitre: "Opérations sur les entiers et décimaux positifs"
  lecon: "Multiplication des entiers et décimaux positifs"
  savoir: "Maîtriser la technique de la multiplication posée, y compris avec décimaux"
  savoir_faire:
    - Multiplier deux entiers par la méthode classique
    - Multiplier deux décimaux en comptant le nombre total de chiffres après la virgule
    - Multiplier par 10, 100, 1000 (déplacement de virgule)
  prerequis_ids: [6e_NUM_Ch2_L1]
  mots_cles: [multiplication, produit, virgule, facteur, décimaux, tables]
  erreurs_frequentes:
    - Mal placer la virgule dans le produit de deux décimaux
    - Oublier de décaler les produits partiels

- id: 6e_NUM_Ch2_L3
  classe: 6e
  domaine: numerique
  chapitre: "Opérations sur les entiers et décimaux positifs"
  lecon: "Division des entiers et décimaux positifs"
  savoir: "Comprendre la division euclidienne et la division décimale"
  savoir_faire:
    - Effectuer une division euclidienne et identifier quotient et reste
    - Effectuer une division décimale (résultat décimal à l'ordre demandé)
    - Diviser par 10, 100, 1000 (déplacement de virgule)
    - Vérifier : dividende = diviseur × quotient + reste
  prerequis_ids: [6e_NUM_Ch2_L2]
  mots_cles: [division, quotient, reste, dividende, diviseur, euclidienne, décimale]
  erreurs_frequentes:
    - Confondre dividende et diviseur dans la pose
    - Abandonner la division avant d'obtenir le nombre de décimales demandé
    - Erreur dans la vérification euclidienne

- id: 6e_NUM_Ch2_L4
  classe: 6e
  domaine: numerique
  chapitre: "Opérations sur les entiers et décimaux positifs"
  lecon: "Règle de priorité des opérations et utilisation des parenthèses"
  savoir: "Énoncer la règle de priorité : × et ÷ avant + et −, parenthèses en premier"
  savoir_faire:
    - Effectuer une chaîne de calculs sans parenthèses en respectant les priorités
    - Effectuer une chaîne de calculs avec parenthèses (max 2 niveaux)
    - Identifier l'ordre correct d'exécution dans une expression donnée
  prerequis_ids: [6e_NUM_Ch2_L1, 6e_NUM_Ch2_L2, 6e_NUM_Ch2_L3]
  mots_cles: [priorité, parenthèses, ordre, opérations, calcul, crochets, chaîne]
  erreurs_frequentes:
    - Calculer de gauche à droite sans tenir compte de la priorité × / sur + −
    - Oublier d'effectuer d'abord le contenu des parenthèses

- id: 6e_NUM_Ch2_L5
  classe: 6e
  domaine: numerique
  chapitre: "Opérations sur les entiers et décimaux positifs"
  lecon: "Propriétés de l'addition et de la multiplication (commutativité, associativité)"
  savoir: "Énoncer et identifier les propriétés : commutativité, associativité, élément neutre"
  savoir_faire:
    - Utiliser la commutativité pour simplifier un calcul (a+b = b+a, ab = ba)
    - Utiliser l'associativité pour regrouper des termes favorables
    - Identifier l'élément neutre de + (zéro) et de × (un)
  prerequis_ids: [6e_NUM_Ch2_L1, 6e_NUM_Ch2_L2]
  mots_cles: [commutativité, associativité, neutre, propriétés, addition, multiplication]
  erreurs_frequentes:
    - Appliquer la commutativité à la soustraction ou à la division

- id: 6e_NUM_Ch2_L6
  classe: 6e
  domaine: numerique
  chapitre: "Opérations sur les entiers et décimaux positifs"
  lecon: "Distributivité de la multiplication par rapport à l'addition"
  savoir: "Énoncer la propriété distributive : k(a+b) = ka + kb et k(a−b) = ka − kb"
  savoir_faire:
    - Développer une expression du type k(a+b) ou k(a−b)
    - Factoriser une expression en mettant un facteur commun en évidence
    - Appliquer la distributivité pour simplifier un calcul mental (ex : 99×7 = 100×7 − 7)
  prerequis_ids: [6e_NUM_Ch2_L5]
  mots_cles: [distributivité, développer, factoriser, facteur commun, k(a+b)]
  erreurs_frequentes:
    - Oublier de distribuer sur tous les termes : écrire k(a+b) = ka + b
    - Confondre développement et factorisation

- id: 6e_NUM_Ch3_L1
  classe: 6e
  domaine: numerique
  chapitre: "Comparaison et rangement de nombres"
  lecon: "Comparaison de deux décimaux — symboles < >"
  savoir: "Utiliser correctement les symboles < et > (la pointe est toujours vers le plus petit)"
  savoir_faire:
    - Comparer deux décimaux et écrire la relation avec < ou >
    - Encadrer un décimal entre deux entiers consécutifs
    - Encadrer un décimal à un ordre donné (dixième, centième…)
  prerequis_ids: [6e_NUM_Ch1_L2]
  mots_cles: [symbole, inégalité, encadrement, consécutifs, ordre]
  erreurs_frequentes:
    - Inverser le sens de l'inégalité

- id: 6e_NUM_Ch3_L2
  classe: 6e
  domaine: numerique
  chapitre: "Comparaison et rangement de nombres"
  lecon: "Approximation décimale — arrondi"
  savoir: "Définir l'approximation par défaut et par excès à un ordre décimal donné"
  savoir_faire:
    - Donner une valeur approchée à 0,1 près (dixième) par défaut ou par excès
    - Donner une valeur approchée à 0,01 près (centième) par défaut ou par excès
