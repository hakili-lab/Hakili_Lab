# ─── ACTIVITÉS NUMÉRIQUES ────────────────────────────────────────────────────

questions_numeriques:

  - id: Q_NUM_01
    reponse: "A = 12 ; B = 14,5"
    solution: >
      A = 25 − 5×(4+1) + [30−(10+24÷3)] = 25 − 25 + [30−18] = 0 + 12 = 12.
      B = −1,8 − [−1,2 − (2,2+3)] + [−0,1 + (5+9) + 4 − 8]
        = −1,8 − [−6,4] + [9,9] = −1,8 + 6,4 + 9,9 = 14,5.

  - id: Q_NUM_02
    reponse: "a) a < 17  b) b ≥ −3  c) −1 < c < 5"
    solution: >
      Traduction directe des énoncés : a est inférieur à 17 → a < 17 ;
      b est supérieur ou égal à −3 → b ≥ −3 ;
      c est strictement compris entre −1 et 5 → −1 < c < 5.

  - id: Q_NUM_03
    reponse: "|−3| = −3 : FAUX  |5−2| = 3 : VRAI  |2−5| = −3 : FAUX"
    solution: >
      |−3| = 3 (valeur absolue toujours positive) → FAUX.
      |5−2| = |3| = 3 → VRAI.
      |2−5| = |−3| = 3 (pas −3) → FAUX.

  - id: Q_NUM_04
    reponse: "C = −4/5 ; D = 1/5"
    solution: >
      C : 1 + 1/2 = 3/2 → 2/(3/2) = 4/3 ; 4/3 − 3 = −5/3 ; (4/3)/(−5/3) = −4/5.
      D : (3 × 4/5) + 2/5 − (3/5 + 2) = 12/5 + 2/5 − 13/5 = 1/5.

  - id: Q_NUM_05
    reponse: "3²×3³=9⁵ FAUX | (−2)⁴=2⁴ VRAI | (5²)³=5⁶ VRAI | 10⁰=10 FAUX"
    solution: >
      3²×3³ = 3⁵ ≠ 9⁵ → FAUX.
      (−2)⁴ = 16 = 2⁴ → VRAI.
      (5²)³ = 5⁶ → VRAI.
      10⁰ = 1 ≠ 10 → FAUX.

  - id: Q_NUM_06
    reponse: "−12∉ℕ VRAI | 4∈𝔻 VRAI | 2,5∉ℝ FAUX | 10/2∈ℤ VRAI"
    solution: >
      −12 n'est pas un entier naturel → VRAI.
      4 = 4,0 est un décimal → VRAI.
      2,5 ∈ ℝ (c'est un réel) → FAUX.
      10/2 = 5 ∈ ℤ → VRAI.

  - id: Q_NUM_07
    reponse: "x = −3  (réponse b)"
    solution: >
      2x + 3 = 5x + 12 → 2x − 5x = 12 − 3 → −3x = 9 → x = −3.

  - id: Q_NUM_08
    reponse: "x ≥ −1  (réponse c)"
    solution: >
      −2x + 1 ≤ 3(x + 2) → −2x + 1 ≤ 3x + 6 → −5x ≤ 5 → x ≥ −1.

  - id: Q_NUM_09
    reponse: "Droite graduée : crochet fermé [ en −1, flèche vers la droite (x ≥ −1)"
    solution: >
      Ensemble solution : [−1 ; +∞[.
      Représentation : placer −1 sur la droite, crochet fermé en −1, colorier vers la droite.

  - id: Q_NUM_10
    reponse: "(3 − 2x)²  (réponse a)"
    solution: >
      4x² − 12x + 9 = (2x − 3)² = (3 − 2x)².
      Identité remarquable (a − b)² avec a = 2x, b = 3.

  - id: Q_NUM_11
    reponse: "25x² − 1  (réponse c)"
    solution: >
      (5x − 1)(5x + 1) = (5x)² − 1² = 25x² − 1.
      Identité remarquable (a − b)(a + b) = a² − b².

  - id: Q_NUM_12
    reponse: "7,2 × 10³  (réponse b)"
    solution: >
      E = 25 × 0,1 × 4 × 720 = 100 × 72 = 7200 = 7,2 × 10³.

  - id: Q_NUM_13
    reponse: "Nombres premiers : 2, 5, 13, 17, 71, 97"
    solution: >
      Un nombre premier est divisible uniquement par 1 et lui-même.
      Parmi la liste proposée, les nombres premiers sont : 2, 5, 13, 17, 71, 97.

  - id: Q_NUM_14
    reponse: "F = 30  (réponse a)"
    solution: >
      F = (2² × 10 × 5² × 3⁴) / (3² × 5² × 12)
        = (4 × 10 × 25 × 81) / (9 × 25 × 12)
        = (4 × 10 × 81) / (9 × 12) = (3240) / (108) = 30.

  - id: Q_NUM_15
    reponse: "a) G(x) = −8x² + 6x − 1  b) G(x) = (2x − 1)(−4x + 1)"
    solution: >
      a) G(x) = (2x−1)(x+1) − 5x(2x−1)
               = 2x² + 2x − x − 1 − 10x² + 5x
               = −8x² + 6x − 1.
      b) G(x) = (2x−1)[(x+1) − 5x] = (2x−1)(−4x+1).

  - id: Q_NUM_16
    reponse: "S = {−2,5 ; 3}"
    solution: >
      (x − 3)(2x + 5) = 0 → x − 3 = 0 → x = 3 ; ou 2x + 5 = 0 → x = −5/2 = −2,5.

  - id: Q_NUM_17
    reponse: "a) f(−1)=13, f(0)=7, f(1/4)=49/8  b) antécédents de 7 : x=0 ou x=2"
    solution: >
      f(x) = 2x² − 4x + 7.
      a) f(−1) = 2(1) − 4(−1) + 7 = 2 + 4 + 7 = 13.
         f(0) = 7.
         f(1/4) = 2(1/16) − 4(1/4) + 7 = 1/8 − 1 + 7 = 49/8.
      b) 2x² − 4x + 7 = 7 → 2x² − 4x = 0 → 2x(x−2) = 0 → x = 0 ou x = 2.

  - id: Q_NUM_18
    reponse: "Moyenne = 9,9  (réponse c)"
    solution: >
      Somme = 7×9 + 8×18 + 10×11 + 12×13 + 13×7 + 15×2
            = 63 + 144 + 110 + 156 + 91 + 30 = 594.
      Effectif total = 9+18+11+13+7+2 = 60.
      Moyenne = 594 / 60 = 9,9.

# ─── ACTIVITÉS GÉOMÉTRIQUES ───────────────────────────────────────────────────

questions_geometriques:

  - id: Q_GEO_01
    reponse: "Angle de 45° construit à partir de [OA) ; bissectrice à 22,5°"
    solution: >
      Tracer [OA). Placer 45° au rapporteur → tracer [OB).
      La bissectrice est la demi-droite à 22,5° (la moitié de l'angle AOB).

  - id: Q_GEO_02
    reponse: "Hauteur : ⊥ au côté opposé par le sommet | Médiane : par le sommet et le milieu du côté opposé | Médiatrice : ⊥ au segment en son milieu"
    solution: >
      Hauteur : droite passant par un sommet et perpendiculaire au côté opposé.
      Médiane : droite passant par un sommet et le milieu du côté opposé.
      Médiatrice : droite perpendiculaire à un segment en son milieu.

  - id: Q_GEO_03
    reponse: "ABFE  (réponse c)"
    solution: >
      Si AB⃗ = EF⃗, alors ABFE est un parallélogramme
      (côtés AB et EF égaux et parallèles selon la définition vectorielle).

  - id: Q_GEO_04
    reponse: "CD⃗ = AB⃗ ; D est l'image de C par la translation d'vecteur AB⃗"
    solution: >
      t_AB⃗(C) = D signifie CD⃗ = AB⃗.
      D est le point tel que le vecteur CD⃗ est égal au vecteur AB⃗.

  - id: Q_GEO_05
    reponse: "Aire = 12 cm²  (réponse d)"
    solution: >
      Triangle rectangle en A avec AB = 6 cm (hypoténuse ? non, cathètes AB et AC).
      Aire = (AB × AC) / 2 = (6 × 4) / 2 = 12 cm².

  - id: Q_GEO_06
    reponse: "47°  (réponse b)"
    solution: >
      Somme des angles d'un triangle = 180°.
      F̂ = 180 − (Ê + Ĝ) = 180 − (35 + 98) = 180 − 133 = 47°.

  - id: Q_GEO_07
    reponse: "Aire = πR² ; Périmètre = 2πR  (réponse a)"
    solution: >
      Formules du cercle de rayon R : Aire du disque = π × R² ; Périmètre = 2 × π × R.

  - id: Q_GEO_08
    reponse: "V = 20 cm³  (réponse d)"
    solution: >
      Volume pyramide = (1/3) × Aire_base × hauteur = (1/3) × 15 × 4 = 20 cm³.

  - id: Q_GEO_09
    reponse: "X⃗ = 3·AD⃗  (réponse c)"
    solution: >
      X⃗ = AC⃗ + CD⃗ − 2·DA⃗ = AD⃗ + 2·AD⃗ = 3·AD⃗.
      (AC⃗ = AD⃗ + DC⃗ = AD⃗ − CD⃗ ; −2DA⃗ = +2AD⃗)

  - id: Q_GEO_10
    reponse: "A(3;4), B(−1;1), C(2;3) ; AB=5, AC=√2, BC=√13 → triangle quelconque ; symétriques A'(5;−6), B'(9;−3), C'(6;−5)"
    solution: >
      AB = √[(3−(−1))² + (4−1)²] = √[16+9] = 5.
      AC = √[(3−2)² + (4−3)²] = √2.
      BC = √[(−1−2)² + (1−3)²] = √13.
      Aucun côté égal, aucun angle droit → triangle quelconque.
      Symétrique par rapport à S(4;−1) : A' = (2×4−3 ; 2×(−1)−4) = (5;−6), etc.

  - id: Q_GEO_11
    reponse: "M' symétrique de M par rapport à (D) : tracer la perpendiculaire à (D) par M, reporter la distance de l'autre côté"
    solution: >
      Construction : tracer la perpendiculaire à (D) passant par M.
      Marquer le point d'intersection H avec (D).
      Reporter MH de l'autre côté : M' tel que HM' = HM et M, H, M' alignés.

  - id: Q_GEO_12
    reponse: "AI⃗ = IB⃗ VRAI | IA⃗ + BI⃗ = 0⃗ VRAI | AB⃗ = 2·AI⃗ VRAI | (1/2)·AB⃗ = IA⃗ FAUX"
    solution: >
      I milieu de [AB] → AI⃗ = IB⃗ (VRAI, définition du milieu).
      IA⃗ + BI⃗ = −AI⃗ + (−IB⃗) = −AI⃗ − AI⃗ = 0⃗ (VRAI, car AI⃗ = IB⃗).
      AB⃗ = AI⃗ + IB⃗ = 2·AI⃗ (VRAI).
      (1/2)·AB⃗ = AI⃗ ≠ IA⃗ = −AI⃗ (FAUX, confusion de sens).

  - id: Q_GEO_13
    reponse: "(IJ) ∥ (BC)  (théorème des milieux)"
    solution: >
      I milieu de [AB] et J milieu de [AC] → par le théorème des milieux,
      (IJ) est parallèle à (BC) et IJ = BC/2.

  - id: Q_GEO_14
    reponse: "I(−3/4 ; 3)  (réponse b)"
    solution: >
      A(−2 ; 6), B(1/2 ; 0).
      xI = (−2 + 1/2) / 2 = (−3/2) / 2 = −3/4.
      yI = (6 + 0) / 2 = 3.
      I(−3/4 ; 3).
