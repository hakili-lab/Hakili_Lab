questions_numeriques:

  - id: Q_NUM_01a
    reponse: "147"
    solution: >
      Une centaine, quatre dizaines, sept unités = 100 + 40 + 7 = 147.

  - id: Q_NUM_01b
    reponse: "1 435 227"
    solution: >
      Un million quatre cent trente-cinq mille deux cent vingt-sept = 1 435 227.

  - id: Q_NUM_02
    reponse: "Vingt-six virgule mille huit cent quatre-vingt-treize"
    solution: >
      26,1893 : partie entière 26 = « vingt-six » ;
      partie décimale 1893 = « mille huit cent quatre-vingt-treize ».

  - id: Q_NUM_03a
    reponse: "Partie entière : 37 | Partie décimale : 907"
    solution: >
      37,907 : avant la virgule → partie entière = 37 ;
      après la virgule → partie décimale = 907 (en millièmes).

  - id: Q_NUM_03b
    reponse: "1→Centaine, 7→Dizaine, 5→Unité, 6→Dixième, 2→Centième"
    solution: >
      Dans 175,62 :
      1 est au rang des centaines, 7 au rang des dizaines, 5 au rang des unités,
      6 au rang des dixièmes, 2 au rang des centièmes.

  - id: Q_NUM_04a
    reponse: "5 856"
    solution: >
      5537 + 319 = 5856 (addition posée avec retenue).

  - id: Q_NUM_04b
    reponse: "2 738"
    solution: >
      290 + x = 3028 → x = 3028 − 290 = 2738.

  - id: Q_NUM_04c
    reponse: "820,9575"
    solution: >
      15,345 × 53,5 = 820,9575.
      Preuve par 9 : somme des chiffres de 15345 → 1+5+3+4+5 = 18 → reste 0 ;
      somme des chiffres de 535 → 5+3+5 = 13 → 1+3 = 4 ; 0 × 4 = 0 ;
      somme des chiffres de 8209575 → 8+2+0+9+5+7+5 = 36 → reste 0. OK.

  - id: Q_NUM_05
    reponse: "339,33  (réponse b)"
    solution: >
      4072 ÷ 12 = 339,33... (vérification : 339 × 12 = 4068, reste 4 → 4072/12 ≈ 339,33).

  - id: Q_NUM_06a
    reponse: "98-112-230-489-500 ou 98;112;230;489;500 ou 98<112<230<489<500"
    solution: >
      Classement croissant des entiers 230, 112, 500, 489, 98 :
      98 < 112 < 230 < 489 < 500.

  - id: Q_NUM_06b
    reponse: "39675 > 1254 > 100 > 49 > 33 > 29,15 ou 
                  39675;1254;100;49;33;29,15 ou 
                  39675-1254-100-49-33-29,15"
    solution: >
      Classement décroissant de 33 ; 29,15 ; 1254 ; 39675 ; 49 ; 100 :
      39675 > 1254 > 100 > 49 > 33 > 29,15.

  - id: Q_NUM_07
    reponse: "72,87 ou 72,86"
    solution: >
      1093 ÷ 15 = 72,8666… → arrondi à 0,01 près : 72,87.

  - id: Q_NUM_08
    reponse: "Ali : 17 ans | Mariam : 14 ans | Le plus âgé : Ali"
    solution: >
      Ali : 2020 − 2003 = 17 ans.
      Mariam : 2020 − 2006 = 14 ans.
      17 > 14 → Ali est le plus âgé.

  - id: Q_NUM_09
    reponse: "9 parties sur 16 (réponse b) ou 7 parties sur 16 (réponse a)"
    solution: >
      La figure est divisée en 16 parts égales, 9 sont coloriées → fraction = 9/16.

  - id: Q_NUM_10
    reponse: "numérateur = 5, dénominateur = 16 (exemple avec 5/16)"
    solution: >
      Dans une fraction p/q : p est le numérateur, q est le dénominateur.
      Exemple : 5/16 → numérateur = 5, dénominateur = 16.

  - id: Q_NUM_11
    reponse: "27/100"
    solution: >
      0,27 = 27 centièmes = 27/100.

  - id: Q_NUM_12
    reponse: "a) 4/5  b) 1/21"
    solution: >
      a) 1/5 + 3/5 = 4/5 .
      b) 5/7 − 2/3 = 15/21 − 14/21 = 1/21.

  - id: Q_NUM_13
    reponse: "6 mètres"
    solution: >
      Ousmane utilise (3/4) de 8 m = 8 × 3/4 = 24/4 = 6 mètres.

  - id: Q_NUM_14
    reponse: "Tableau : ligne 1 : 1, 5, 4 | ligne 2 : 4, 20, 16"
    solution: >
      Rapport de proportionnalité = 4.
      1 × 4 = 4 ; 5 × 4 = 20 ; 4 × 4 = 16.

  - id: Q_NUM_15
    reponse: "20%"
    solution: >
      6 œufs cassés sur 30 : 6/30 = 0,2 = 20%.

# ─── ACTIVITÉS GÉOMÉTRIQUES ───────────────────────────────────────────────────

questions_geometriques:

  - id: Q_GEO_01
    reponse: "a) ligne brisée  b) ligne courbée  c) ligne droite"
    solution: >
      Une ligne droite est une ligne sans courbure ni angle.
      Une ligne courbée change continuellement de direction.
      Une ligne brisée est formée de segments consécutifs non alignés.

  - id: Q_GEO_02
    reponse: "Droite tracée passant par A et B"
    solution: >
      Poser la règle sur les deux points A et B, tracer la droite (AB).
      La droite est infinie dans les deux sens.

  - id: Q_GEO_03
    reponse: "Une droite  (réponse a)"
    solution: >
        Confère figure  
  - id: Q_GEO_04
    reponse: "Segment [EF] de 6 cm tracé ; milieu I placé à 3 cm de E et de F"
    solution: >
      Tracer [EF] = 6 cm à la règle.
      Milieu I : reporter 3 cm depuis E (ou depuis F).

  - id: Q_GEO_05
    reponse: "a) horizontale  b) verticale  c) oblique"
    solution: >
     Lire la figure : a) horizontale (parallèle à l'horizon) ; b) verticale  ; c) oblique (ni horizontale ni verticale).
  - id: Q_GEO_06
    reponse: "Perpendiculaires"
    solution: >
      Deux droites qui se coupent en formant un angle droit (90°) sont perpendiculaires.

  - id: Q_GEO_07
    reponse: "Les droites parallèles repérées à l'aide de l'équerre sont (C) et (D)"
    solution: >
      Utiliser l'équerre et la règle : si deux droites sont équidistantes ou si
      l'équerre glisse sans que les droites se rejoignent, elles sont parallèles.

  - id: Q_GEO_08
    reponse: "a) FAUX  b) VRAI"
    solution: >
      a) L'angle droit mesure 90°, l'angle aigu mesure moins de 90°.
         Donc l'angle droit est PLUS GRAND que l'angle aigu → FAUX.
      b) Un angle de 180° est un angle plat → VRAI.

  - id: Q_GEO_09
    reponse: "Angle de 40° tracé au rapporteur (construction géométrique)"
    solution: >
      Tracer une demi-droite [OA). Poser le rapporteur en O, aligner sur [OA),
      marquer 40°, tracer [OB). L'angle AOB mesure 40°.

  - id: Q_GEO_10
    reponse: "3 côtés  (réponse b)"
    solution: >
      Un triangle est un polygone à 3 côtés et 3 sommets.

  - id: Q_GEO_11
    reponse: "Triangle équilatéral de côté 5 cm construit au compas"
    solution: >
      Tracer un segment [AB] = 5 cm. Avec le compas ouvert à 5 cm, tracer deux arcs
      depuis A et depuis B. Le point d'intersection C donne un triangle équilatéral.

  - id: Q_GEO_12
    reponse: "c"
    solution: >
      Parmi les figures proposées, le cercle est la courbe fermée dont tous les
      points sont à égale distance d'un centre.

 
  - id: Q_GEO_13
    reponse: "b : rayon × rayon × π "
    solution: >
      Formule de l'aire du disque de rayon R : A = π × R².
      Équivalent : rayon × rayon × π.
 
  - id: Q_GEO_14
    reponse: "4,082 m"
    solution: >
      P=π × D = π × 1,3 m ≈ 4,082 m
 
  - id: Q_GEO_15
    reponse: "carré"
    solution: >
      carré : 4 côtés égaux et 4 angles droits.

  - id: Q_GEO_16
    reponse: "losange de 10 cm et 4cm"
    solution: >
      voir figure : losange avec diagonales de 10 cm et 4 cm.

  - id: Q_GEO_17
    reponse: "40 cm²"
    solution: >
     Aire du trapeze = (B + b) × h / 2 = (4+ 12) × 5 / 2 = 40 cm².

  - id: Q_GEO_18
    reponse: " L= 14 m "
    solution: >
     48=2×(L+10) → 24=L+10 → L=14 m.
