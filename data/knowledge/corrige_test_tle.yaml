# ─── ACTIVITÉS NUMÉRIQUES ────────────────────────────────────────────────────

questions_numeriques:

  - id: Q_NUM_01
    reponse: "a = 1,1 × 10²"
    solution: >
      a = (275 × 10⁻⁴) / (0,025 × 10⁻²)
        = (275/0,025) × (10⁻⁴/10⁻²)
        = 11000 × 10⁻²
        = 1,1 × 10⁴ × 10⁻²
        = 1,1 × 10².

  - id: Q_NUM_02
    reponse: "(a+b)/2 ≥ √(ab) pour tout a>0, b>0 ; égalité si et seulement si a = b"
    solution: >
      ((a+b)/2)² − (√ab)² = (a+b)²/4 − ab
                           = (a² + 2ab + b²)/4 − ab
                           = (a² − 2ab + b²)/4
                           = (a−b)²/4 ≥ 0.
      Donc ((a+b)/2)² ≥ (√ab)². Comme les deux membres sont positifs :
      (a+b)/2 ≥ √ab.
      Égalité si a − b = 0, c'est-à-dire a = b.

  - id: Q_NUM_03a
    reponse: "A = 13"
    solution: >
      A = 5[(((−2−1)+3)−6)+5] − 3(2(−2+1)−4)
        = 5[((−3+3)−6)+5] − 3(2(−1)−4)
        = 5[(0−6)+5] − 3(−2−4)
        = 5[−6+5] − 3(−6)
        = 5(−1) + 18
        = −5 + 18
        = 13.

  - id: Q_NUM_03b
    reponse: "B = 90/13"
    solution: >
      B = √(288/169) × √225/√8
        = (√288/√169) × (√225/√8)
        = (√288 × 15) / (13 × √8)
        = (15/13) × √(288/8)
        = (15/13) × √36
        = (15/13) × 6
        = 90/13.

  - id: Q_NUM_03c
    reponse: "C = 0"
    solution: >
      On utilise √(a²) = |a|.
      |√3 − 2| = 2 − √3  (car √3 < 2)
      |√3 + 2| = √3 + 2  (car √3 + 2 > 0)
      C = (2 − √3) − (√3 + 2) + 2√3
        = 2 − √3 − √3 − 2 + 2√3
        = 0.

  - id: Q_NUM_03d
    reponse: "D = 1"
    solution: >
      D = √(√2+1) × √(√2−1)
        = √((√2+1)(√2−1))
        = √((√2)² − 1²)
        = √(2 − 1)
        = √1
        = 1.

  - id: Q_NUM_04a
    reponse: "FAUX"
    solution: >
      (3/2)⁶ = 3⁶/2⁶, pas 3⁶/2. L'exposant s'applique aussi au dénominateur.

  - id: Q_NUM_04b
    reponse: "VRAI"
    solution: >
      (3/4)² = 3²/4² = 9/16. Propriété (a/b)ⁿ = aⁿ/bⁿ.

  - id: Q_NUM_04c
    reponse: "FAUX"
    solution: >
      (5/7)⁻¹ = 7/5 (inverse de la fraction).
      (−5)/(−7) = 5/7 ≠ 7/5.

  - id: Q_NUM_04d
    reponse: "VRAI"
    solution: >
      21/3 = 7, donc (21/3)⁴ = 7⁴.

  - id: Q_NUM_04e
    reponse: "VRAI"
    solution: >
      (14/13)⁻¹ = 13/14. L'inverse d'une fraction a/b est b/a.

  - id: Q_NUM_04f
    reponse: "FAUX"
    solution: >
      4³ × 5³ = (4×5)³ = 20³. Ce n'est pas 20⁶.

  - id: Q_NUM_04g
    reponse: "VRAI"
    solution: >
      ((3/2)³)⁻⁵ = (3/2)^(3×(−5)) = (3/2)⁻¹⁵. Propriété (aⁿ)ᵐ = aⁿˣᵐ.

  - id: Q_NUM_04h
    reponse: "FAUX"
    solution: >
      (17/13)⁰ = 1 (tout réel non nul à la puissance 0 vaut 1), pas 17/13.

  - id: Q_NUM_05a
    reponse: "A = 7/6"
    solution: >
      De l'intérieur vers l'extérieur :
      3/4 − 1/2 = 3/4 − 2/4 = 1/4.
      1/(1/4) = 4.
      2 + 4 = 6.
      A = 1 + 1/6 = 6/6 + 1/6 = 7/6.

  - id: Q_NUM_05b
    reponse: "B = 3/2"
    solution: >
      9² = (3²)² = 3⁴  et  4⁻³ = (2²)⁻³ = 2⁻⁶.
      B = (3⁴ × 2⁻⁶) / (2⁻⁵ × 3³)
        = 3^(4−3) × 2^(−6−(−5))
        = 3¹ × 2⁻¹
        = 3/2.

  - id: Q_NUM_06
    reponse: "A = 3²"
    solution: >
      27 = 3³  ⟹  (27)⁻⁶ = (3³)⁻⁶ = 3⁻¹⁸.
      (3⁻⁵)⁻² = 3^(10).
      1/9 = 3⁻²  ⟹  (1/9)⁻⁵ = (3⁻²)⁻⁵ = 3^(10).
      A = 3⁻¹⁸ × 3¹⁰ × 3¹⁰ = 3^(−18+10+10) = 3².

  - id: Q_NUM_07a
    reponse: "−4,8 ≤ w+z < 2"
    solution: >
      On additionne membre à membre :
      1,3 ≤ w ≤ 5  et  −6,1 < z < −3.
      1,3 + (−6,1) ≤ w+z < 5 + (−3)
      −4,8 ≤ w+z < 2.

  - id: Q_NUM_07b
    reponse: "−15 < wz < −7,93"
    solution: >
      w > 0 et z < 0, donc le produit wz est négatif.
      Les bornes : 1,3 × (−6,1) = −7,93  et  5 × (−3) = −15.
      Mais attention à l'ordre (produit négatif → inégalités inversées) :
      −15 < wz < −7,93.

  - id: Q_NUM_07c
    reponse: "−13/61 ≤ w/z < −5/3"
    solution: >
      z négatif : 1/(−6,1) < 1/z < 1/(−3)  ⟺  −10/61 < 1/z < −1/3.
      On multiplie par w > 0 (l'inégalité ne change pas de sens) :
      1,3 × (−10/61) ≤ w/z < 5 × (−1/3)
      −13/61 ≤ w/z < −5/3.

  - id: Q_NUM_08a
    reponse: "Valeur absolue : |x−5| ≤ 2 | Distance : d(x;5) ≤ 2 | Encadrement : 3 ≤ x ≤ 7"
    solution: >
      x ∈ [3;7] a pour centre (3+7)/2 = 5 et rayon (7−3)/2 = 2.
      Valeur absolue : |x−5| ≤ 2.
      Distance : d(x;5) ≤ 2.
      Encadrement : 3 ≤ x ≤ 7 (déjà donné).

  - id: Q_NUM_08b
    reponse: "Valeur absolue : |x−6| ≤ 7 | Distance : d(x;6) ≤ 7 | Encadrement : −1 ≤ x ≤ 13"
    solution: >
      x ∈ [−1;13] a pour centre (−1+13)/2 = 6 et rayon (13−(−1))/2 = 7.
      Valeur absolue : |x−6| ≤ 7.
      Distance : d(x;6) ≤ 7.
      Encadrement : −1 ≤ x ≤ 13 (déjà donné).

  - id: Q_NUM_09a
    reponse: "A = 2x(2x−1)"
    solution: >
      A = (2x−1)² − (1−2x)
        = (2x−1)² + (2x−1)   [car −(1−2x) = +(2x−1)]
        = (2x−1)[(2x−1) + 1]
        = (2x−1)(2x)
        = 2x(2x−1).

  - id: Q_NUM_09b
    reponse: "B = 3(x−2)(4−x)"
    solution: >
      B = (x−1)² − (5−2x)²  [différence de carrés a²−b²]
        = [(x−1) − (5−2x)] × [(x−1) + (5−2x)]
        = [x−1−5+2x] × [x−1+5−2x]
        = [3x−6] × [4−x]
        = 3(x−2)(4−x).

  - id: Q_NUM_09c
    reponse: "C = (x+3)(x+4)"
    solution: >
      C = x² + 7x + 12.
      Chercher a et b tels que a + b = 7 et ab = 12 : a = 3, b = 4.
      C = x² + 3x + 4x + 12 = x(x+3) + 4(x+3) = (x+3)(x+4).

  - id: Q_NUM_10a
    reponse: "S = {4/3 ; 8}"
    solution: >
      |x+2| = |−2x+6| ⟺ x+2 = −2x+6  ou  x+2 = −(−2x+6) = 2x−6.
      Cas 1 : x+2 = −2x+6  →  3x = 4  →  x = 4/3.
      Cas 2 : x+2 = 2x−6   →  −x = −8  →  x = 8.
      S = {4/3 ; 8}.

  - id: Q_NUM_10b
    reponse: "S = ∅"
    solution: >
      |−3x+1| ≥ 0 pour tout réel x. Il est impossible qu'une valeur absolue soit égale à −1.
      S = ∅.

  - id: Q_NUM_10c
    reponse: "S = {−3 ; 4}"
    solution: >
      16 − x² = 4 − x
      (4−x)(4+x) = 4 − x
      (4−x)(4+x) − (4−x) = 0
      (4−x)[(4+x) − 1] = 0
      (4−x)(3+x) = 0
      x = 4  ou  x = −3.
      S = {−3 ; 4}.

  - id: Q_NUM_10d
    reponse: "S = ]−∞ ; −1[ ∪ ]3 ; +∞["
    solution: >
      −x²+2x+3 < 0 ⟺ x²−2x−3 > 0.
      Factorisation : x²−2x−3 = (x+1)(x−3).
      Tableau de signes :
        x+1 < 0 pour x < −1 ; = 0 pour x = −1 ; > 0 pour x > −1.
        x−3 < 0 pour x < 3  ; = 0 pour x = 3  ; > 0 pour x > 3.
      Produit > 0 : x < −1 ou x > 3.
      S = ]−∞ ; −1[ ∪ ]3 ; +∞[.

  - id: Q_NUM_10e
    reponse: "S = [−6 ; 7]"
    solution: >
      |x − 1/2| ≤ 13/2
      ⟺  −13/2 ≤ x − 1/2 ≤ 13/2
      ⟺  −13/2 + 1/2 ≤ x ≤ 13/2 + 1/2
      ⟺  −12/2 ≤ x ≤ 14/2
      ⟺  −6 ≤ x ≤ 7.
      S = [−6 ; 7].

  - id: Q_NUM_10f
    reponse: "S = {π/4 + 2kπ ; −π/4 + 2kπ | k ∈ ℤ}"
    solution: >
      √2 cos x = 1
      cos x = 1/√2 = √2/2.
      cos x = cos(π/4).
      S = {π/4 + 2kπ  ;  −π/4 + 2kπ  |  k ∈ ℤ}.

  - id: Q_NUM_13
    reponse: "P(2) = 0, donc P(x) est factorisable par (x−2)"
    solution: >
      P(2) = 2³ − 4×2² + 5×2 − 2
           = 8 − 16 + 10 − 2
           = 0.
      Puisque P(2) = 0, d'après le théorème du facteur, (x−2) divise P(x).

  - id: Q_NUM_16
    reponse: "S = {(21/8 ; 5/8)}"
    solution: >
      Équation 1 : x/3 + y/5 = 1  (×15)  →  5x + 3y = 15.
      Équation 2 : x/2 − y/2 = 1  (×2)   →  x − y = 2  →  x = y + 2.
      Substitution dans Éq. 1 :
        5(y+2) + 3y = 15
        5y + 10 + 3y = 15
        8y = 5  →  y = 5/8.
        x = 5/8 + 2 = 5/8 + 16/8 = 21/8.
      S = {(21/8 ; 5/8)}.

