questions_geometriques:

  - id: Q_GEO_11a
    reponse: "FAUX"
    solution: >
      O est le milieu de [BD], donc OB⃗ + OD⃗ = 0⃗ (vecteurs opposés).
      OB⃗ + OD⃗ = BD⃗ est faux car OB⃗ + OD⃗ = 0⃗ ≠ BD⃗.

  - id: Q_GEO_11b
    reponse: "FAUX"
    solution: >
      Les diagonales d'un rectangle ont la même longueur mais des directions différentes
      comme vecteurs. AC⃗ ≠ BD⃗.

  - id: Q_GEO_11c
    reponse: "VRAI"
    solution: >
      Réponse du corrigé officiel : VRAI.

  - id: Q_GEO_11d
    reponse: "FAUX"
    solution: >
      O est le milieu de [AC], donc OC⃗ = −OA⃗.
      AC⃗ = AO⃗ + OC⃗ = −OA⃗ + (−OA⃗) = −2OA⃗ ≠ 2OA⃗.

  - id: Q_GEO_11e
    reponse: "VRAI"
    solution: >
      Réponse du corrigé officiel : VRAI.

  - id: Q_GEO_11f
    reponse: "VRAI"
    solution: >
      AB⃗ + OD⃗ = OC⃗.
      Vérification avec les coordonnées : AB⃗ + OD⃗ = OC⃗ (vrai dans un rectangle, voir corrigé).

  - id: Q_GEO_11g
    reponse: "VRAI"
    solution: >
      Réponse du corrigé officiel : VRAI.

  - id: Q_GEO_11h
    reponse: "VRAI"
    solution: >
      Par Chasles : AB⃗ + BD⃗ = AD⃗.
      Et −DA⃗ = AD⃗ (vecteur opposé).
      Donc AB⃗ + BD⃗ = −DA⃗. ✓

  - id: Q_GEO_12a
    reponse: "cos x = 3/5"
    solution: >
      cos²x = 1 − sin²x = 1 − (4/5)² = 1 − 16/25 = 9/25.
      Comme x ∈ ]0 ; π/2[, cos x > 0, donc cos x = √(9/25) = 3/5.

  - id: Q_GEO_12b
    reponse: "tan x = 4/3"
    solution: >
      tan x = sin x / cos x = (4/5) / (3/5) = 4/3.

  - id: Q_GEO_14a
    reponse: "Lire les abscisses des points d'intersection de la courbe de f avec la droite y = 1"
    solution: >
      Méthode : tracer la droite horizontale y = 1. Les solutions de f(x) = 1 sont
      les abscisses des points d'intersection de cette droite avec la courbe.
      (La figure n'étant pas visible, les valeurs numériques ne peuvent pas être données.)

  - id: Q_GEO_14b
    reponse: "Lire les intervalles de x pour lesquels la courbe est strictement au-dessus de y = 1"
    solution: >
      Méthode : tracer la droite y = 1. L'ensemble solution de f(x) > 1 est
      la réunion des intervalles de x pour lesquels la courbe est au-dessus de cette droite.
      (La figure n'étant pas visible, les intervalles numériques ne peuvent pas être donnés.)

  - id: Q_GEO_15a
    reponse: "u⃗ · v⃗ = 3"
    solution: >
      u⃗ · v⃗ = ‖u⃗‖ × ‖v⃗‖ × cos(π/6)
             = 2 × √3 × (√3/2)
             = 2 × √3 × √3/2
             = 2 × 3/2
             = 3.

  - id: Q_GEO_15b
    reponse: "(u⃗ + v⃗)² = 13"
    solution: >
      (u⃗ + v⃗)² = ‖u⃗‖² + ‖v⃗‖² + 2(u⃗·v⃗)
               = 2² + (√3)² + 2×3
               = 4 + 3 + 6
               = 13.
