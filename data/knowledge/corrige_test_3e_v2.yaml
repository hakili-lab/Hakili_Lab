# ─── ACTIVITÉS NUMÉRIQUES ────────────────────────────────────────────────────

questions_numeriques:

  - id: Q_NUM_01
    reponse: "IN: entiers naturels | D: décimaux | ℤ: entiers relatifs | Q: rationnels | IR: réels"
    solution: >
      IN = {0, 1, 2, 3, …} : entiers naturels.
      D = {a/10ⁿ, a∈ℤ, n∈IN} : décimaux (ex : 3,14 = 314/100).
      ℤ = {…, −2, −1, 0, 1, 2, …} : entiers relatifs.
      Q = {a/b | a∈ℤ, b∈ℤ, b≠0} : rationnels (toute fraction).
      IR = Q ∪ {irrationnels} : inclut √2, π, etc.

  - id: Q_NUM_02
    reponse: "a) FAUX | b) VRAI | c) VRAI | d) FAUX | e)VRAI | f)VRAI"
    solution: >
      a) D⊂IN : FAUX — D contient des nombres non entiers (ex : 0,5) qui n'appartiennent pas à IN.
      b) IN⊂ℤ : VRAI — tout entier naturel est aussi un entier relatif.
      c) 8∈D : VRAI — 8 = 8,0 = 80/10 est un décimal.
      d) 2,765∉Q : FAUX — 2,765 est un décimal donc appartient à D⊂Q, donc VRAI.
      e) 3,145689∈IR : VRAI — tout réel appartient à IR.
      f) Toute Suite Décimale Illimitée Périodique est une fraction → appartient à Q : VRAI.

  - id: Q_NUM_03a
    reponse: "A = 54"
    solution: >
      A = (+42) + (+12) = 42 + 12 = 54.

  - id: Q_NUM_03b
    reponse: "B = −68,9"
    solution: >
      B = (−22,2) + (−46,7) = −22,2 − 46,7 = −68,9.
      
  - id: Q_NUM_03c
    reponse: "C = −39"
    solution: >
      C = 27 + 3 × (35 − 57)
        = 27 + 3 × (−22)
        = 27 + (−66)
        = 27 − 66
        = −39.

  - id: Q_NUM_03d
    reponse: "D = −2135"
    solution: >
      D=−5×[−3−5×(12−4×25)]−(+3+27−80)
      =−5×[−3−5×(12−100)]−(−50)
      =−5×[−3−5×(−88)]+50
      =−5×[−3+440]+50
      =−5×437+50 =−2185+50 = −2135

  - id: Q_NUM_04
    reponse: "Par défaut : 2,85 | Par excès : 2,86"
    solution: >
      X = 2,85418541…
      Au centième (1/100) :
        Par défaut (troncature) : 2,85  (on garde les centièmes, on supprime la suite)
        Par excès : 2,86  (le digit des millièmes = 4 < 5, mais on arrondit vers le haut pour "par excès")
      Encadrement : 2,85 ≤ X < 2,86.

  - id: Q_NUM_05
    reponse: "572 = 2² × 11 × 13 | 127= 127×1"
    solution: >
      572 ÷ 2 = 286 ; 286 ÷ 2 = 143 ; 143 ÷ 11 = 13 ; 13 est premier.
      Donc 572 = 2² × 11 × 13.
      127 : non divisible par 2, 3, 5, 7, 11 (11² = 121 < 127 < 169 = 13²)
      → 127 est un nombre premier.

  - id: Q_NUM_06
    reponse: "A = 2²¹ | B = 2⁸ | C = 2⁻²"
    solution: >
      A = (2³)⁷ = 2^(3×7) = 2²¹.
      B = (−2)³ × (−2)⁵ = (−2)^(3+5) = (−2)⁸ = 2⁸  .
      C = (−2)³ ÷ (−2)⁵ = (−2)^(3−5) = (−2)⁻² = 2⁻² .

  - id: Q_NUM_07
    reponse: "IR⁺ ∪ IR⁻ = IR | IR⁺ ∩ IR⁻ = {0}"
    solution: >
      IR⁺ = {x ∈ IR | x ≥ 0} ; IR⁻ = {x ∈ IR | x ≤ 0}.
      IR⁺ ∪ IR⁻ = IR  (tout réel est soit positif, soit négatif, soit nul).
      IR⁺ ∩ IR⁻ = {0}  (seul 0 est à la fois positif et négatif).

  - id: Q_NUM_08
    reponse: "f(x) =3x²-2x= x(3x−2) | g(x) =36x²-84x+49=(6x−7)² | h(x) =9x²-16= (3x−4)(3x+4) | i(x) = 25x²+30x+9 = (5x+3)²"
    solution: >
      f(x) = 3x² − 2x = x(3x − 2)  [facteur commun x].
      g(x) = 36x² − 84x + 49 = (6x)² − 2×6x×7 + 7² = (6x − 7)²  [identité (a−b)²].
      h(x) = 9x² − 16 = (3x)² − 4² = (3x − 4)(3x + 4)  [identité (a−b)(a+b)].
      i(x) = 25x² + 30x + 9 = (5x)² + 2×5x×3 + 3² = (5x + 3)²  [identité (a+b)²].

  - id: Q_NUM_09
    reponse: "j(x) = x³ − 3x² − 3x − 4 | g(x) = 4x² − 12x + 9"
    solution: >
      j(x) = (x² + x + 1)(x − 4)
           = x³ − 4x² + x² − 4x + x − 4
           = x³ − 3x² − 3x − 4.
      g(x) = (3 − 2x)² = 9 − 2×3×2x + (2x)² = 9 − 12x + 4x² = 4x² − 12x + 9.

  - id: Q_NUM_10
    reponse: "x = 12 | x = 9 | x = 4 "
    solution: >
      Équation 1 : 18 + x = 30 → x = 30 − 18 = 12.
      Équation 2 : 4x = 36 → x = 36 ÷ 4 = 9.
      Équation 3 : 28/x = 7 → 28 = 7x → x=28 ÷ 7 → x = 4.

  - id: Q_NUM_11
    reponse: "x ≤ −1 ; sur la droite graduée : crochet fermé en −1, flèche vers la gauche"
    solution: >
      −3x − 2 ≥ 1
      → −3x ≥ 1 + 2
      → −3x ≥ 3
      → x ≤ −1 
      Ensemble solution : ]−∞ ; −1].

  - id: Q_NUM_12
    reponse: "Karim : 1 750 F | Moussa : 3 250 F"
    solution: >
      Total à partager : 5 000 F dans le rapport 7:13.
      Nombre de parts total : 7 + 13 = 20.
      Valeur d'une part : 5 000 ÷ 20 = 250 F.
      Part de Karim : 7 × 250 = 1 750 F.
      Part de Moussa : 13 × 250 = 3 250 F.
      Vérification : 1 750 + 3 250 = 5 000 F. 

  - id: Q_NUM_13
    reponse: "A = 41/4 | B = 15/7 | C = -15/14 | D = −89/12"
    solution: >
      A = 7/4 × 3 + 5 = 21/4 + 20/4 = 41/4.
      B = 2 × 3/7 + 9/7 = 6/7 + 9/7 = 15/7.
      C = −3 ÷ ((−2)÷(5 ÷ (-7))) = −3 ÷(14/5) = -3*5/14 =-15/14.
      D = (5/(-3)) − (−5/4)) - 7 = -20/12 + 15/12 - 84/12 = (-20 + 15 - 84) / 12 = -89/12.

# ─── ACTIVITÉS GÉOMÉTRIQUES ───────────────────────────────────────────────────

questions_geometriques:

  - id: Q_GEO_1a
    reponse: "A(−7), B(−3), C(0), D(3,5), E(5) placés sur la droite (unité = 1 cm)"
    solution: >
      Sur la droite graduée de gauche à droite :
      A à −7, B à −3, C à 0 (origine), D à 3,5 (entre 3 et 4), E à 5.
      Unité = 1 cm → chaque graduation correspond à 1 cm.

  - id: Q_GEO_1b
    reponse: "AB = 4 cm"
    solution: >
      A(−7), B(−3) sur la droite graduée.
      AB = |xB − xA| = |−3 − (−7)| = |−3 + 7| = |4| = 4 cm.

  - id: Q_GEO_02
    reponse: "A(3;−4), B(−1/2;−2), C(0;−4) placés dans le repère (O,I,J)"
    solution: >
      Dans le repère (O,I,J) d'unité 1 cm :
      A(3 ; −4) : abscisse 3 à droite, ordonnée −4 en bas.
      B(−1/2 ; −2) = B(−0,5 ; −2) : à gauche de O, en dessous.
      C(0 ; −4) : sur l'axe des ordonnées, 4 unités en dessous de O.

  - id: Q_GEO_03
    reponse: "a) Angles opposés par le sommet sont égaux | b) Angles alternes-internes sont égaux si les droites sont parallèles | c) Somme des angles d'un triangle = 180°"
    solution: >
      a) Deux droites sécantes forment des angles opposés par le sommet qui sont égaux.
      b) Deux droites parallèles coupées par une sécante forment des angles alternes-internes
         de même mesure (et des angles correspondants égaux).
      c) Dans tout triangle, la somme des trois angles est égale à 180°.

  - id: Q_GEO_04
    reponse: "ABCD est un parallélogramme (car AB = DC et AB∥DC)"
    solution: >
      Si AB= DC, alors les segments [AB] et [DC] sont de même longueur et de même direction.
      Par définition vectorielle, ABCD est un parallélogramme.

  - id: Q_GEO_05
    reponse: " AB +  BC =  AC |  AB +  AD =  AC"
    solution: >
      Relation de Chasles :  AB +  BC =  AC.
      Dans un parallélogramme ABCD :  AD =  BC (côtés parallèles et égaux).
      Donc  AB +  AD =  AB +  BC =  AC.

  - id: Q_GEO_06
    reponse: "2EF= AC | −3GH = LI | NP = 2MN | MP = −3CB"
    solution: >
      Lecture sur le quadrillage (chaque carré = 1 unité) :
      AC est deux fois EF en longueur et même direction → 2EF = AC.
      LI est trois fois GH en longueur et direction opposée → −3GH = LI.
      NP est deux fois MN en longueur et même direction → NP = 2MN.
      MP est trois fois CB en longueur et direction opposée → MP = −3CB.

  - id: Q_GEO_07a
    reponse: " A' = intersection de (D) avec la parallèle à (L) passant par A | B' = projeté orthogonal de B sur (D)"
    solution: >
      A' (projeté de A sur (D) parallèlement à (L)) :
        Tracer par A la parallèle à (L) ; son intersection avec (D) est A'.
      B' (projeté orthogonal de B sur (D)) :
        Tracer par B la perpendiculaire à (D) ; son intersection avec (D) est B'.

  
  - id: Q_GEO_08
    reponse: "symétrique de B par rapport à G = L | symétrique de E par rapport à (OC) = G | I est le projeté de L sur (AM) parallèlement à la droite (DP)"
    solution: >
      Symétrique de B/G = L :
        G est le milieu de [BL] ; L est tel que G = milieu de [BL].
      Symétrique de E/(OC) = G :
        (OC) est l'axe de symétrie ; G est le symétrique de E par rapport à (OC).
      I projeté de L sur (AM) parallèlement à (DP)

  - id: Q_GEO_09
    reponse: "Pyramide : V = (1/3) × Aire_base × h | Cylindre : V = π × R² × h"
    solution: >
      Volume d'une pyramide : V = (1/3) × Aire de la base × hauteur.
      Volume d'un cylindre de révolution : V = π × R² × h
      où R est le rayon de la base circulaire et h la hauteur.
