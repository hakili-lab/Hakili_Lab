# ============================================================================
# BARÈME — TEST HAKILI LAB NIVEAU 3ème — VERSION 2
# Source : "Test-niveau 3ieme v2.docx"
# Objet : Évaluation des compétences 6e → 4e pour entrée en 3e (version 2)
# Scoring : points_originaux par question (fractions admises)
#
# Note : Le document source indique 13 pts (NUM) + 7 pts (GEO) = 20 pts.
# La somme des points détaillés ci-dessous est 11,50 (NUM) + 7,00 (GEO) = 18,50.
